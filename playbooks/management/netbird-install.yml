---
- name: Install NetBird on Linux hosts
  hosts: all
  become: true
  gather_facts: true

  vars:
    netbird_management_url: ""
    netbird_setup_key: ""

  tasks:
    - name: Ensure curl is installed (Debian)
      ansible.builtin.apt:
        name: curl
        state: present
        update_cache: true
      when: ansible_facts['os_family'] == 'Debian'

    - name: Download NetBird installer script
      ansible.builtin.get_url:
        url: https://pkgs.netbird.io/install.sh
        dest: /tmp/netbird-install.sh
        mode: "0755"

    - name: Run NetBird installer script
      ansible.builtin.shell: |
        set -o pipefail
        /tmp/netbird-install.sh
      args:
        executable: /bin/bash
        creates: /usr/bin/netbird
      tags: [netbird]

    - name: Ensure netbird service is enabled and started
      ansible.builtin.service:
        name: netbird
        state: started
        enabled: true

    - name: Register netbird if not already connected
      ansible.builtin.command:
        argv:
          - netbird
          - up
          - --management-url
          - "{{ netbird_management_url }}"
          - --setup-key
          - "{{ netbird_setup_key }}"
      register: netbird_up
      changed_when: >
        netbird_up.rc == 0 and
        ('Already connected' not in (netbird_up.stdout | default('') + netbird_up.stderr | default('')))
      failed_when: >
        netbird_up.rc != 0 and
        ('Already connected' not in (netbird_up.stdout | default('') + netbird_up.stderr | default('')))
