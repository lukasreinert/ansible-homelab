---
- name: Ensure NetBird on all clients
  hosts: proxmox
  become: true
  gather_facts: true

  tasks:
    - name: Download NetBird installer script
      ansible.builtin.get_url:
        url: https://pkgs.netbird.io/install.sh
        dest: /tmp/netbird-install.sh
        mode: "0755"

    - name: Run NetBird installer script
      ansible.builtin.shell: |
        set -o pipefail
        /tmp/netbird-install.sh
      args:
        executable: /bin/bash
        creates: /usr/bin/netbird

    - name: Ensure netbird service is enabled and started
      ansible.builtin.service:
        name: netbird
        state: started
        enabled: true

    - name: Register netbird if not already connected
      ansible.builtin.command:
        argv:
          - netbird
          - up
          - --management-url
          - "{{ netbird_management_url }}"
          - --setup-key
          - "{{ netbird_setup_key }}"
      register: netbird_up
      changed_when: >
        netbird_up.rc == 0 and
        ('Already connected' not in (netbird_up.stdout | default('') + netbird_up.stderr | default('')))
      failed_when: >
        netbird_up.rc != 0 and
        ('Already connected' not in (netbird_up.stdout | default('') + netbird_up.stderr | default('')))
